# Jekyll build: runs on every push to main so "push and it works"
# GitHub Pages will build from source when using default branch;
# this workflow validates the build and can be extended to deploy via Actions.

name: Jekyll build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Install dependencies
        run: bundle install
      - name: Build site
        run: bundle exec jekyll build
